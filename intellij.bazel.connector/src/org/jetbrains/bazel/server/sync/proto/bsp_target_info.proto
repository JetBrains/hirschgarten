syntax = "proto3";

package bazelbsp;

option java_package = "org.jetbrains.bazel.info";

message ArtifactLocation {
  // The path of this file relative to its root. This excludes the
  // aforementioned root, i.e. configuration-specific fragments of the path.
  // This path can be different to File.short_path.
  string relative_path = 2;

  // True if this is a source file, i.e. it is not generated.
  bool is_source = 3;

  // The root beneath which this file resides. Not equal to File.root.path,
  // normalizes relative paths and therefore also includes the bazel-bin
  // prefix for the artifact.
  string root_path = 4;

  // Whether this artifact comes from an external repository.
  bool is_external = 5;
}

message TargetKey {
  string label = 1;

  // All ids of the aspects executed for this target. Excluding all intellij
  // aspect ids.
  repeated string aspect_ids = 3;

  // The short configuration hash for this target. Not available in all Bazel
  // versions.
  string configuration = 4;
}

message Dependency {
  enum DependencyType {
    COMPILE = 0;
    RUNTIME = 1;
  }

  TargetKey target = 1;
  DependencyType dependency_type = 2;
  bool exported = 3;
}

message JvmOutputs {
  repeated ArtifactLocation binary_jars = 1;
  repeated ArtifactLocation interface_jars = 2;
  repeated ArtifactLocation source_jars = 3;
}

message JvmTargetInfo {
  repeated string jvm_flags = 7;
  string main_class = 8;
  repeated string args = 9;
  optional string resource_strip_prefix = 13;
}

message JavaProviderInfo {
  repeated ArtifactLocation full_compile_jars = 1;
}

message JavaToolchainInfo {
  string source_version = 1;
  string target_version = 2;
  ArtifactLocation java_home = 3;
  ArtifactLocation boot_classpath_java_home = 4;
}

message JavaRuntimeInfo {
  ArtifactLocation java_home = 1;
}

message ScalaTargetInfo {
  repeated string scalac_opts = 1;
  repeated ArtifactLocation compiler_classpath = 2;
  repeated string scalatest_classpath_targets = 4;
}

message KotlincPluginOption {
  string plugin_id = 100;
  string option_value = 200;
}

message KotlincPluginInfo {
  repeated ArtifactLocation plugin_jars = 100;
  repeated KotlincPluginOption kotlinc_plugin_options = 200;
}

message KotlinTargetInfo {
  string language_version = 100;
  string api_version = 200;
  repeated string associates = 300;
  repeated string kotlinc_opts = 400;
  repeated ArtifactLocation stdlibs = 500;
  repeated KotlincPluginInfo kotlinc_plugin_infos = 600;
  string module_name = 700;
  repeated string exported_compiler_plugin_targets_from_deps = 601;
}

message JavaCommonInfo {
  repeated string javac_opts = 1;
  repeated JvmOutputs jars = 2;
  repeated JvmOutputs generated_jars = 3;
  repeated ArtifactLocation jdeps = 4;
}

message PythonTargetInfo {
  ArtifactLocation interpreter = 1;
  string version = 2;
  repeated string imports = 3;
  repeated ArtifactLocation generated_sources = 5;
  ArtifactLocation main = 6;
  string main_module = 7;
}

message GoTargetInfo {
  string import_path = 1;
  ArtifactLocation sdk_home_path = 2;
  repeated ArtifactLocation generated_sources = 3;
  repeated ArtifactLocation generated_libraries = 4;
  repeated string library_labels = 5;
}

message ProtobufTargetInfo {
  repeated ProtobufSourceMapping source_mappings = 3;
}

message ProtobufSourceMapping {
  string import_path = 1;
  ArtifactLocation proto_file = 2;
}

message TargetInfo {
  TargetKey key = 2;
  string kind = 20;
  repeated string tags = 30;
  repeated Dependency dependencies = 40;
  repeated ArtifactLocation sources = 50;
  repeated ArtifactLocation generated_sources = 51;
  repeated ArtifactLocation resources = 60;
  map<string, string> env = 70;
  repeated string env_inherit = 80;
  bool executable = 90;
  string workspace_name = 100;
  JvmTargetInfo jvm_target_info = 1000;
  bool jvm_target = 1004;
  bool has_api_generating_plugins = 1005;
  string generator_name = 1500;
  JavaProviderInfo java_provider = 1008;
  JavaCommonInfo java_common = 1007;
  JavaToolchainInfo java_toolchain_info = 2000;
  JavaRuntimeInfo java_runtime_info = 3000;
  ScalaTargetInfo scala_target_info = 4000;
  KotlinTargetInfo kotlin_target_info = 7000;
  PythonTargetInfo python_target_info = 8000;
  GoTargetInfo go_target_info = 12000;
  ProtobufTargetInfo protobuf_target_info = 14000;
}
