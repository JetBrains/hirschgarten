version: "1.0"
profile:
  name: qodana.recommended
exclude:
  - name: QodanaSanity
    paths:
      - plugin-bazel/src/test/testData/bazelrc
      - plugin-bazel/src/test/testData/starlark
    patterns:
      # exclude aspects template files - qodana can't handle them
      - "**/*.bzl.template"
  - name: All
    patterns:
      # exclude generated lexer files
      - "**/_*.java"
  - name: CheckDependencyLicenses
  - name: KotlinInvalidBundleOrProperty
include:
  - name: QodanaSanity
failureConditions:
  severityThresholds:
    critical: 1
